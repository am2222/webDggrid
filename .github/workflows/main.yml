# Builds, publishes npm package, creates GitHub release with WASM assets

name: npm Package

on:
  workflow_dispatch:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org/
          persist-credentials: false
      - run: corepack enable
      - uses: mymindstorm/setup-emsdk@v11
      - name: Verify emcc
        run: emcc -v
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Bump version and build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run publish:patch
      - name: Get new version
        id: version
        run: echo "new_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Push commit and version tag
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          tags: true
      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-files
          path: |
            lib-wasm/libdggrid.js
            lib-wasm/libdggrid.wasm
            lib-wasm-py/libdggrid.js
            lib-wasm-py/libdggrid.wasm

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org/
      - run: corepack enable
      - run: git pull --rebase
      - run: yarn install --immutable
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wasm artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-files
      - name: Rename wasm files to avoid name collisions
        run: |
          mv lib-wasm/libdggrid.js    lib-wasm-libdggrid.js
          mv lib-wasm/libdggrid.wasm  lib-wasm-libdggrid.wasm
          mv lib-wasm-py/libdggrid.js   lib-wasm-py-libdggrid.js
          mv lib-wasm-py/libdggrid.wasm lib-wasm-py-libdggrid.wasm
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.new_version }}
          name: v${{ needs.build.outputs.new_version }}
          generate_release_notes: true
          files: |
            lib-wasm-libdggrid.js
            lib-wasm-libdggrid.wasm
            lib-wasm-py-libdggrid.js
            lib-wasm-py-libdggrid.wasm
