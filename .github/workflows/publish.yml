name: Build, Publish, Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org/

      - run: corepack enable

      - uses: mymindstorm/setup-emsdk@v11

      - name: Verify emcc
        run: emcc -v

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Rename WASM assets to avoid name collisions
        run: |
          cp lib-wasm/libdggrid.js    lib-wasm-libdggrid.js
          cp lib-wasm/libdggrid.wasm  lib-wasm-libdggrid.wasm
          cp lib-wasm-py/libdggrid.js   lib-wasm-py-libdggrid.js
          cp lib-wasm-py/libdggrid.wasm lib-wasm-py-libdggrid.wasm

      - name: Upload WASM assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lib-wasm-libdggrid.js
            lib-wasm-libdggrid.wasm
            lib-wasm-py-libdggrid.js
            lib-wasm-py-libdggrid.wasm

  verify-published:
    needs: build-publish-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Wait for npm registry
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Waiting for webdggrid@${VERSION} on npm…"
          for i in $(seq 1 12); do
            if npm view "webdggrid@${VERSION}" version &>/dev/null; then
              echo "Package available."
              break
            fi
            echo "  not yet (attempt ${i}/12), retrying in 10s…"
            sleep 10
          done

      - name: Install published package
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          mkdir /tmp/pkg-test
          cd /tmp/pkg-test
          echo '{"type":"module"}' > package.json
          npm install "webdggrid@${VERSION}"

      - name: Smoke test published package
        run: |
          cp utils/smoke-test.mjs /tmp/pkg-test/
          cd /tmp/pkg-test
          node smoke-test.mjs webdggrid

