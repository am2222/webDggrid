name: Build, Publish, Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org/

      - run: corepack enable

      - uses: mymindstorm/setup-emsdk@v11

      - name: Verify emcc
        run: emcc -v

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Rename WASM assets to avoid name collisions
        run: |
          cp lib-wasm/libdggrid.js    lib-wasm-libdggrid.js
          cp lib-wasm/libdggrid.wasm  lib-wasm-libdggrid.wasm
          cp lib-wasm-py/libdggrid.js   lib-wasm-py-libdggrid.js
          cp lib-wasm-py/libdggrid.wasm lib-wasm-py-libdggrid.wasm

      - name: Upload WASM assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lib-wasm-libdggrid.js
            lib-wasm-libdggrid.wasm
            lib-wasm-py-libdggrid.js
            lib-wasm-py-libdggrid.wasm

  deploy-docs:
    needs: build-publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build docs
        run: yarn docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
