<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Webdggrid + Leaflet</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 12px 16px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            min-width: 200px;
        }
        #controls h3 { margin: 0 0 10px; font-size: 14px; }
        #controls label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; margin-bottom: 10px; }
        #controls input[type=range] { width: 100%; }
        #controls button {
            width: 100%;
            padding: 7px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        #controls button:hover { background: #0055aa; }
        #controls button:disabled { background: #aaa; cursor: default; }
        #status {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: white;
            padding: 6px 14px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            font-size: 13px;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <div id="controls">
        <h3>DGGRID Hex Grid</h3>
        <label>
            Resolution: <strong id="resValue">3</strong>
            <input type="range" id="resolution" min="1" max="5" value="3" />
        </label>
        <button id="generateBtn" disabled>Loading WASM…</button>
    </div>

    <div id="status">Loading WASM…</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { Webdggrid } from "/dist/index.js";

        // --- Map setup ---
        const map = L.map('map').setView([37.5, -96], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        // --- UI refs ---
        const statusEl   = document.getElementById('status');
        const resSlider  = document.getElementById('resolution');
        const resValueEl = document.getElementById('resValue');
        const generateBtn = document.getElementById('generateBtn');

        resSlider.addEventListener('input', () => {
            resValueEl.textContent = resSlider.value;
        });

        // --- Load WASM ---
        const webdggrid = await Webdggrid.load();
        statusEl.textContent = 'WASM loaded — click "Generate Grid"';
        generateBtn.textContent = 'Generate Grid';
        generateBtn.disabled = false;

        // --- Grid layer ---
        let gridLayer = null;

        function generateGrid() {
            if (!webdggrid) return;

            const resolution = parseInt(resSlider.value, 10);
            const bounds = map.getBounds();
            const minLat = Math.max(bounds.getSouth(), -85);
            const maxLat = Math.min(bounds.getNorth(),  85);
            const minLng = bounds.getWest();
            const maxLng = bounds.getEast();

            statusEl.textContent = 'Generating grid…';
            generateBtn.disabled = true;

            // Use setTimeout so the status text renders before the (synchronous) WASM work
            setTimeout(() => {
                try {
                    // Sample a regular grid of points across the visible bounds
                    const steps = 25;
                    const latStep = (maxLat - minLat) / steps;
                    const lngStep = (maxLng - minLng) / steps;
                    const coordinates = [];

                    for (let i = 0; i <= steps; i++) {
                        for (let j = 0; j <= steps; j++) {
                            coordinates.push([
                                minLng + j * lngStep,  // lng first
                                minLat + i * latStep   // then lat
                            ]);
                        }
                    }

                    // Convert sample points → DGGS cell IDs
                    const seqNums = webdggrid.geoToSequenceNum(coordinates, resolution);

                    // Deduplicate (BigInt-safe via string key)
                    const seen = new Set();
                    const uniqueSeqNums = [];
                    for (const n of seqNums) {
                        const key = n.toString();
                        if (!seen.has(key)) { seen.add(key); uniqueSeqNums.push(n); }
                    }

                    // Convert cell IDs → GeoJSON FeatureCollection
                    const featureCollection = webdggrid.sequenceNumToGridFeatureCollection(uniqueSeqNums, resolution);

                    // Swap old layer for new
                    if (gridLayer) map.removeLayer(gridLayer);

                    gridLayer = L.geoJSON(featureCollection, {
                        style: {
                            color: '#0055aa',
                            weight: 1.5,
                            fillColor: '#4499ff',
                            fillOpacity: 0.18
                        },
                        onEachFeature(feature, layer) {
                            layer.bindTooltip(`Cell ID: ${feature.properties.id}`, { sticky: true });
                            layer.on('click', () => {
                                layer.setStyle({ fillOpacity: 0.55, fillColor: '#ff7700' });
                                setTimeout(() => layer.setStyle({ fillOpacity: 0.18, fillColor: '#4499ff' }), 800);
                            });
                        }
                    }).addTo(map);

                    statusEl.textContent = `${uniqueSeqNums.length} cells at resolution ${resolution}`;
                } catch (err) {
                    statusEl.textContent = `Error: ${err.message}`;
                    console.error(err);
                } finally {
                    generateBtn.disabled = false;
                }
            }, 20);
        }

        generateBtn.addEventListener('click', generateGrid);

        // Auto-generate on initial load
        generateGrid();
    </script>
</body>

</html>
